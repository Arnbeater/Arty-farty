<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arty-farty | Dithering + Animation Studio</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hero">
        <p class="eyebrow">Creative Control Deck</p>
        <h1>Arty-farty Studio</h1>
        <p class="hero-copy">Modern, minimal and bold: choose animation or image rendering, then export your frame.</p>
      </header>

      <section class="controls" aria-label="Studio controls">
        <div class="mode-row">
          <label class="mode-label">
            <span>Render mode</span>
            <select id="mode">
              <option value="dither">Dithering bitmap</option>
              <option value="animation" selected>Animation</option>
            </select>
          </label>
          <button id="downloadPng" type="button">Download PNG</button>
        </div>

        <div id="ditherControls" class="control-group">
          <label>
            Upload reference image
            <input id="imageInput" type="file" accept="image/*" />
          </label>

          <label>
            Dither algorithm
            <select id="algorithm">
              <option value="floyd-steinberg">Floyd–Steinberg</option>
              <option value="ordered">Ordered (Bayer 4×4)</option>
              <option value="threshold">Threshold</option>
            </select>
          </label>

          <label>
            Bitmap width (px)
            <input id="bitmapWidth" type="range" min="120" max="1200" step="10" value="640" />
          </label>

          <label>
            Contrast
            <input id="contrast" type="range" min="0.5" max="2.2" step="0.1" value="1.2" />
          </label>

          <label>
            Brightness
            <input id="brightness" type="range" min="-90" max="90" step="1" value="0" />
          </label>

          <label>
            Threshold
            <input id="threshold" type="range" min="0" max="255" step="1" value="128" />
          </label>

          <label>
            Noise / grain
            <input id="noise" type="range" min="0" max="80" step="1" value="0" />
          </label>

          <label class="checkbox-row">
            <input id="invertTone" type="checkbox" />
            Invert tones
          </label>

          <label>
            Ink color
            <input id="inkColor" type="color" value="#111111" />
          </label>

          <label>
            Paper color
            <input id="paperColor" type="color" value="#f4f1e8" />
          </label>

          <button id="render" type="button">Render Dithered Bitmap</button>
        </div>

        <div id="animationControls" class="control-group hidden">
          <label>
            Pixel density
            <input id="particleCount" type="range" min="40" max="420" step="10" value="180" />
          </label>

          <label>
            Speed
            <input id="speed" type="range" min="0.2" max="2.8" step="0.1" value="1.1" />
          </label>

          <label>
            Drift / warp
            <input id="warp" type="range" min="0" max="3" step="0.1" value="1.2" />
          </label>

          <label>
            Trail fade
            <input id="trail" type="range" min="0.02" max="0.35" step="0.01" value="0.1" />
          </label>

          <label>
            Glow
            <input id="glow" type="range" min="0" max="28" step="1" value="9" />
          </label>

          <button id="shufflePalette" type="button">Regenerate Pattern</button>
          <button id="toggleAnimation" type="button">Pause Animation</button>
        </div>
      </section>

      <p id="status" class="status">Monochrome dither animation active. Switch to dithering mode when you want to process an uploaded image.</p>
      <canvas id="artboard" aria-label="Output canvas"></canvas>
    </main>

    <script src="app.js"></script>
  </body>
</html>
