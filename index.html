<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arty-farty | Dithering Bitmap Creator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header>
        <h1>🖼️ Dithering Bitmap Creator</h1>
        <p>Upload a photo or graphic and render stylized dithered bitmap art on one canvas.</p>
      </header>

      <section class="controls" aria-label="Dithering controls">
        <label>
          Upload reference image
          <input id="imageInput" type="file" accept="image/*" />
        </label>

        <label>
          Dither algorithm
          <select id="algorithm">
            <option value="floyd-steinberg">Floyd–Steinberg</option>
            <option value="ordered">Ordered (Bayer 4×4)</option>
            <option value="threshold">Threshold</option>
          </select>
        </label>

        <label>
          Bitmap width (px)
          <input id="bitmapWidth" type="range" min="120" max="1200" step="10" value="640" />
        </label>

        <label>
          Contrast
          <input id="contrast" type="range" min="0.5" max="2.2" step="0.1" value="1.2" />
        </label>

        <label>
          Brightness
          <input id="brightness" type="range" min="-90" max="90" step="1" value="0" />
        </label>

        <label>
          Threshold
          <input id="threshold" type="range" min="0" max="255" step="1" value="128" />
        </label>

        <label>
          Noise / grain
          <input id="noise" type="range" min="0" max="80" step="1" value="0" />
        </label>

        <label class="checkbox-row">
          <input id="invertTone" type="checkbox" />
          Invert tones
        </label>

        <label>
          Ink color
          <input id="inkColor" type="color" value="#111111" />
        </label>

        <label>
          Paper color
          <input id="paperColor" type="color" value="#f4f1e8" />
        </label>

        <button id="render" type="button">Render Dithered Bitmap</button>
        <button id="downloadPng" type="button">Download PNG</button>
      </section>

      <p id="status" class="status">Upload an image to begin.</p>
      <canvas id="artboard" aria-label="Dithered bitmap output canvas"></canvas>
    </main>

    <script src="app.js"></script>
  </body>
</html>
